<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>CSS Headings 練習</title>
    <style>
        body {
            /* 使用圖片中的襯線字體 */
            font-family: "Times New Roman", serif;
            padding: 40px;
            line-height: 1.6;
        }

        /* Heading 1: 上劃線 + 粉紅色文字陰影 */
        h1 {
            font-size: 36px;
            text-decoration: overline;
            text-decoration-thickness: 3px; /* 讓上劃線粗一點 */
            text-shadow: 3px 3px 0px pink; /* 製作粉紅色的重疊效果 */
            margin-bottom: 30px;
        }

        /* Heading 2: 斜體 + 黃色立體邊框 */
        h2 {
            font-style: italic;
            border: 4px ridge yellow; /* 使用 ridge 樣式來呈現圖片中的 3D 質感 */
            padding: 5px 10px;
            width: fit-content; /* 讓邊框貼合文字長度，若要全寬可移除此行 */
            min-width: 80%;
            margin-bottom: 30px;
        }

        /* Heading 3: 右對齊 + 底線 */
        h3 {
            text-align: right;
            text-decoration: underline;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>This is heading 1</h1>

    <h2>This is heading 2</h2>

    <h3>This is heading 3</h3>

</body>
</html>
